name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check shared
        run: pnpm --filter @nexusmind/shared exec tsc --noEmit

      - name: Type-check desktop
        run: pnpm --filter @nexusmind/desktop exec tsc --noEmit

      - name: Build (dry-run)
        run: pnpm run build --dry-run

      - name: Test
        run: pnpm test
