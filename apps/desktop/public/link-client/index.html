<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusLink — Remote Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #7c6af7;
    }
    .conn-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: flex-end;
    }
    .conn-row input {
      padding: 4px 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
      width: 200px;
    }
    .conn-row input:focus { outline: none; border-color: #7c6af7; }
    .btn {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    .btn:hover { background: #2a2a2a; }
    .btn.primary { background: #7c6af7; border-color: #7c6af7; color: white; }
    .btn.primary:hover { background: #6b5be6; }
    .btn.danger { background: #c93b3b; border-color: #c93b3b; color: white; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #3fb950; box-shadow: 0 0 6px #3fb95080; }
    .status-dot.connecting { background: #f0a500; }
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid #1e1e1e;
    }
    .panel-pty { flex: 2; }
    .panel-swarm { flex: 1; min-width: 220px; }
    .panel-header {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #111;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }
    #pty-output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #swarm-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-size: 12px;
    }
    .swarm-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #1e1e1e;
    }
    .swarm-key { color: #888; font-size: 11px; }
    .swarm-val { color: #c9d1d9; font-size: 11px; font-family: monospace; }
    .status-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
    }
    .badge-idle { background: #333; color: #aaa; }
    .badge-running { background: #1a3a1a; color: #3fb950; }
    .badge-completed { background: #1a2a3a; color: #58a6ff; }
    .badge-failed { background: #3a1a1a; color: #f85149; }
    .empty-state {
      color: #555;
      font-size: 12px;
      text-align: center;
      margin-top: 32px;
    }
    .pty-tab-bar {
      display: flex;
      gap: 4px;
      padding: 4px 8px;
      background: #0d0d0d;
      border-bottom: 1px solid #1e1e1e;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .pty-tab {
      padding: 2px 10px;
      border-radius: 3px;
      font-size: 11px;
      background: #1a1a1a;
      border: 1px solid #333;
      cursor: pointer;
      color: #888;
      white-space: nowrap;
    }
    .pty-tab.active { background: #2a2a2a; color: #e0e0e0; border-color: #555; }
    footer {
      padding: 4px 12px;
      background: #0a0a0a;
      border-top: 1px solid #1e1e1e;
      font-size: 10px;
      color: #555;
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>NexusLink</h1>
    <div class="conn-row">
      <span id="status-dot" class="status-dot"></span>
      <input id="url-input" type="text" value="ws://localhost:7771" placeholder="ws://host:port" />
      <input id="token-input" type="password" placeholder="Token (optional)" style="width:140px" />
      <button class="btn primary" id="btn-connect" onclick="connect()">Connect</button>
      <button class="btn danger" id="btn-disconnect" onclick="disconnect()" style="display:none">Disconnect</button>
    </div>
  </header>

  <div class="main">
    <div class="panel panel-pty">
      <div class="panel-header">PTY Stream</div>
      <div id="pty-tab-bar" class="pty-tab-bar"></div>
      <div id="pty-output"><span style="color:#555">No data yet…</span></div>
    </div>
    <div class="panel panel-swarm">
      <div class="panel-header">Swarm Status</div>
      <div id="swarm-content">
        <div class="empty-state">No swarm session</div>
      </div>
    </div>
  </div>

  <footer>
    <span id="footer-status">Disconnected</span>
    <span id="footer-clients"></span>
    <span id="footer-events"></span>
  </footer>

  <script>
    let ws = null
    let eventCount = 0
    let activePtyId = null
    const ptyBuffers = {}
    const tabs = {}

    function setStatus(dot, text) {
      const d = document.getElementById('status-dot')
      d.className = 'status-dot' + (dot ? ' ' + dot : '')
      document.getElementById('footer-status').textContent = text
    }

    function connect() {
      const url = document.getElementById('url-input').value.trim()
      const token = document.getElementById('token-input').value.trim()
      if (ws) { ws.close(); ws = null }

      setStatus('connecting', 'Connecting…')
      ws = new WebSocket(url)

      ws.onopen = () => {
        setStatus('connected', 'Connected')
        document.getElementById('btn-connect').style.display = 'none'
        document.getElementById('btn-disconnect').style.display = ''
        if (token) {
          ws.send(JSON.stringify({ type: 'auth', payload: { token } }))
        }
      }

      ws.onclose = (e) => {
        setStatus('', 'Disconnected — ' + (e.reason || 'code ' + e.code))
        document.getElementById('btn-connect').style.display = ''
        document.getElementById('btn-disconnect').style.display = 'none'
        ws = null
      }

      ws.onerror = () => setStatus('', 'Connection error')

      ws.onmessage = (e) => {
        let msg
        try { msg = JSON.parse(e.data) } catch { return }
        eventCount++
        document.getElementById('footer-events').textContent = eventCount + ' events'
        handleEvent(msg)
      }
    }

    function disconnect() {
      if (ws) { ws.close(); ws = null }
    }

    function handleEvent(msg) {
      switch (msg.type) {
        case 'pty:data':
          handlePtyData(msg.payload)
          break
        case 'session:summary':
          handleSessionSummary(msg.payload)
          break
        case 'swarm:status':
          handleSwarmStatus(msg.payload)
          break
        case 'ping':
          if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'pong', payload: null }))
          break
        case 'auth':
          if (msg.payload && msg.payload.ok) {
            document.getElementById('footer-status').textContent = 'Authenticated'
          }
          break
      }
    }

    function handlePtyData(payload) {
      const { id, data } = payload
      if (!ptyBuffers[id]) {
        ptyBuffers[id] = ''
        tabs[id] = 'Terminal ' + id.slice(0, 6)
        renderTabs()
      }
      // Strip ANSI escape codes for readability
      ptyBuffers[id] += data.replace(/\x1b\[[0-9;]*[mGKHFJABCDSTusr]/g, '')
      if (!activePtyId) activePtyId = id
      if (activePtyId === id) renderPty()
    }

    function handleSessionSummary(summary) {
      if (summary.ptyTabs) {
        for (const t of summary.ptyTabs) {
          if (!tabs[t.id]) {
            tabs[t.id] = t.title
            ptyBuffers[t.id] = ptyBuffers[t.id] || ''
          }
        }
        renderTabs()
      }
    }

    function handleSwarmStatus(payload) {
      const el = document.getElementById('swarm-content')
      const state = payload.state || {}
      const status = state.status || 'idle'
      const badgeClass = {
        idle: 'badge-idle',
        orchestrating: 'badge-running',
        executing: 'badge-running',
        converging: 'badge-running',
        completed: 'badge-completed',
        failed: 'badge-failed',
      }[status] || 'badge-idle'

      el.innerHTML = `
        <div class="swarm-row">
          <span class="swarm-key">Session</span>
          <span class="swarm-val">${(payload.id || '—').slice(0, 8)}…</span>
        </div>
        <div class="swarm-row">
          <span class="swarm-key">Status</span>
          <span class="swarm-val"><span class="status-badge ${badgeClass}">${status}</span></span>
        </div>
        <div class="swarm-row">
          <span class="swarm-key">Round</span>
          <span class="swarm-val">${state.currentRound ?? 0}</span>
        </div>
        <div class="swarm-row">
          <span class="swarm-key">Agents</span>
          <span class="swarm-val">${(state.agentIds || []).length}</span>
        </div>
        <div class="swarm-row">
          <span class="swarm-key">Node</span>
          <span class="swarm-val">${payload.activeNode || '—'}</span>
        </div>
        <div class="swarm-row">
          <span class="swarm-key">Consensus</span>
          <span class="swarm-val">${state.consensusReached ? 'Yes' : 'No'}</span>
        </div>
      `
    }

    function renderTabs() {
      const bar = document.getElementById('pty-tab-bar')
      bar.innerHTML = ''
      for (const id of Object.keys(tabs)) {
        const btn = document.createElement('button')
        btn.className = 'pty-tab' + (id === activePtyId ? ' active' : '')
        btn.textContent = tabs[id]
        btn.onclick = () => { activePtyId = id; renderTabs(); renderPty() }
        bar.appendChild(btn)
      }
    }

    function renderPty() {
      const el = document.getElementById('pty-output')
      if (!activePtyId || !ptyBuffers[activePtyId]) {
        el.innerHTML = '<span style="color:#555">No data yet…</span>'
        return
      }
      const buf = ptyBuffers[activePtyId]
      const lines = buf.split('\n')
      const MAX_LINES = 2000
      const visible = lines.slice(-MAX_LINES)
      el.textContent = visible.join('\n')
      el.scrollTop = el.scrollHeight
    }
  </script>
</body>
</html>
